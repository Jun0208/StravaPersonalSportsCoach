name: Weekly Strava Extract

# Target: finish comfortably before 9am UK time on Monday, so the Claude Code
# Remote routine (which writes the coach narrative and triggers the email)
# has a buffer to run afterwards. GitHub Actions cron is UTC-only and can't
# itself shift for UK daylight saving, so this uses two schedules -- one for
# the BST months (UTC+1) and one for GMT months (UTC+0) -- both landing at
# 8:00am UK local time. Around the actual DST changeover weekend (last
# Sunday of March / October) this can be off by up to an hour for one run.
on:
  schedule:
    - cron: "0 7 * 3-10 1"   # Mon 07:00 UTC = 08:00 BST (Mar-Oct)
    - cron: "0 8 * 11,12,1,2 1"  # Mon 08:00 UTC = 08:00 GMT (Nov-Feb)
  workflow_dispatch:
    inputs:
      full:
        description: "Pull entire Strava history instead of just the last week (use for the first-ever run)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Extract Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            python3 scripts/extract_strava.py --full
          else
            python3 scripts/extract_strava.py
          fi

      - name: Analyze last completed week
        run: python3 scripts/analyze.py

      - name: Build dashboard (without coach narrative yet)
        run: python3 scripts/build_report.py

      - name: Commit and push data + dashboard
        run: |
          git config user.name "strava-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly Strava sync $(date -u +%F)"
            git push
          fi
